apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: omada-sensor
  namespace: argo-events
spec:
  template:
    serviceAccountName: argo-events-sa
  dependencies:
    - name: omada-dep
      eventSourceName: hpa-app-webhook
      eventName: omada
  triggers:
    - template:
        name: omada-workflow-trigger
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: omada-ci-
                namespace: argo
              spec:
                containerRuntimeExecutor: emissary
                workflowTemplateRef:
                  name: omada-ci-pipeline
                arguments:
                  parameters:
                    - name: branch
                      value: main
          parameters:
            - src:
                dependencyName: omada-dep
                dataKey: body.ref
              dest: spec.arguments.parameters.0.value

