apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: hpa-app-webhook
  namespace: argo-events
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
  webhook:
    hpa-app:
      port: "12000"
      endpoint: "/push"
      method: POST
      secret: # Require GitHub signature verification
        name: hpa-app-webhook-secret
        key: webhook-token
    omada:
      port: "12000"
      endpoint: "/push-omada"
      method: POST
      secret: # Require GitHub signature verification
        name: hpa-app-webhook-secret
        key: webhook-token
