apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: hpa-app-sensor
  namespace: argo-events
spec:
  template:
    serviceAccountName: argo-events-sa
  dependencies:
    - name: test-dep
      eventSourceName: hpa-app-webhook
      eventName: push
  triggers:
    - template:
        name: hpa-app-workflow-trigger
        k8s:
          group: argoproj.io
          version: v1alpha1
          resource: workflows
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: hpa-app-ci-
                namespace: argo
              spec:
                workflowTemplateRef:
                  name: hpa-app-ci-pipeline
                arguments:
                  parameters:
                    - name: git-url
                      value: "https://github.com/joebertj/hpa-app.git"
                    - name: git-revision
                      value: "main"
          parameters:
            - src:
                dependencyName: test-dep
                dataKey: body.ref
              dest: arguments.parameters.1.value
