---
# argo-workflows-app.yaml — Argo CD Application for Argo Workflows Operator
# Installs the official Helm chart with server auth-mode configured

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    targetRevision: 0.41.0 # Stable version
    helm:
      parameters:
        - name: server.extraArgs
          value: "{--auth-mode=server,--secure=false}"
        - name: server.readinessProbe.httpGet.scheme
          value: "HTTP"
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
