---
# argo-workflows-app.yaml — Argo CD Application for Argo Workflows Operator
# Final stabilization fix: 2026-03-24T21:38:00
# Installs the official Helm chart with server auth-mode configured

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    targetRevision: 0.41.0 # Stable version
    helm:
      values: |
        controller:
          extraEnv:
            - name: ARGO_CONTAINER_RUNTIME_EXECUTOR
              value: emissary
          workflowDefaults:
            spec:
              ttlStrategy:
                secondsAfterCompletion: 604800  # 7 days
                secondsAfterSuccess: 604800     # 7 days
                secondsAfterFailure: 604800     # 7 days
          retention:
            completed: 20
            failed: 10
            errored: 10
        server:
          extraArgs:
            - --auth-mode=server
            - --auth-mode=client
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
      - Force=true
