---
# harbor-app.yaml — Argo CD Application for the Harbor Registry
# Uses in-line values to avoid external URL dependencies

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: 1.13.0
    helm:
      values: |
        expose:
          type: clusterIP
          tls:
            enabled: true
            secretName: "home-kenchlightyear-tls"
        externalURL: https://registry.home.kenchlightyear.com
        existingSecretAdminPassword: "harbor-admin-password"
        existingSecretAdminPasswordKey: "HARBOR_ADMIN_PASSWORD"
        persistence:
          enabled: true
          persistentVolumeClaim:
            registry:
              size: 20Gi
              storageClass: "local-path"
            jobservice:
              size: 1Gi
              storageClass: "local-path"
            database:
              size: 5Gi
              storageClass: "local-path"
            redis:
              size: 1Gi
              storageClass: "local-path"
            trivy:
              size: 5Gi
              storageClass: "local-path"
        trivy:
          enabled: true
        notary:
          enabled: false
        chartmuseum:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: homelab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
