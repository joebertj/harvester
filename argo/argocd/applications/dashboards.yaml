---
# dashboards-app.yaml — Argo CD Application for Custom Grafana Dashboards
# Watches the monitoring/dashboards/ directory for ConfigMaps

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dashboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/joebertj/harvester.git
    targetRevision: main
    path: monitoring/dashboards
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
