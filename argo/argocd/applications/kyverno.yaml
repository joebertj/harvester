---
# kyverno.yaml — Argo CD Application for Kyverno Policy Engine
# Using chart v2.7.5 (app v1.9.5) for k8s 1.21 compatibility

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: 2.7.5
    helm:
      values: |
        replicaCount: 1
        resources:
          limits:
            memory: 384Mi
          requests:
            cpu: 100m
            memory: 128Mi
        config:
          excludeGroupRole:
            - system:serviceaccounts:kube-system
            - system:nodes
          resourceFilters:
            - "[Event,*,*]"
            - "[*,kube-system,*]"
            - "[*,kube-public,*]"
            - "[*,kube-node-lease,*]"
            - "[*,kyverno,*]"
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
