# -------------------------------------------------------
# Common resources shared by both HPA deployment variants:
#   - hpa-topology-spread.yaml   (topologySpreadConstraints)
#   - hpa-pod-anti-affinity.yaml (podAntiAffinity)
#
# Apply this file first, then apply one of the variant files.
# Usage:
#   kubectl apply -f hpa-common.yaml
#   kubectl apply -f hpa-topology-spread.yaml   # OR
#   kubectl apply -f hpa-pod-anti-affinity.yaml
# -------------------------------------------------------

apiVersion: v1
kind: Namespace
metadata:
  name: harvester-autoscaling-sim


apiVersion: v1
kind: Service
metadata:
  name: fastapi-metrics-service
  namespace: harvester-autoscaling-sim
  labels:
    app: fastapi-metrics
spec:
  selector:
    app: fastapi-metrics
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastapi-metrics-hpa
  namespace: harvester-autoscaling-sim
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fastapi-metrics-app
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Pods
    pods:
      metric:
        name: simulated_user_load
      target:
        type: AverageValue
        averageValue: 10
