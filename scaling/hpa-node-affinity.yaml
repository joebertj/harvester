# -------------------------------------------------------
# Deployment Variant: nodeAffinity
#
# Pods are strictly restricted to worker nodes.
# They will NEVER run on the 'control' node.
#
# Best for: Isolating workloads from the control plane
# without using global taints.
#
# Apply after hpa-common.yaml:
#   kubectl apply -f hpa-common.yaml
#   kubectl apply -f hpa-node-affinity.yaml
# -------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-metrics-app
  namespace: harvester-autoscaling-sim
  labels:
    app: fastapi-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-metrics
  template:
    metadata:
      labels:
        app: fastapi-metrics
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: fastapi-metrics
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - work-1
                - work-2
                - work-3
      imagePullSecrets:
      - name: harbor-pullsecret
      containers:
      - name: fastapi
        image: registry.home.kenchlightyear.com/library/scaling-fastapi:20260323-134924
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
