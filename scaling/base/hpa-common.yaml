# -------------------------------------------------------
# Common resources shared by all HPA deployment variants:
#   - hpa-topology-spread.yaml   (topologySpreadConstraints)
#   - hpa-pod-anti-affinity.yaml (podAntiAffinity)
#   - hpa-taints-tolerations.yaml (Taints/Tolerations)
#
# Usage:
#   kubectl apply -f hpa-common.yaml
# -------------------------------------------------------

apiVersion: v1
kind: Namespace
metadata:
  name: harvester-autoscaling-sim

---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-metrics-service
  namespace: harvester-autoscaling-sim
  labels:
    app: fastapi-metrics
spec:
  selector:
    app: fastapi-metrics
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      name: http

---
apiVersion: autoscaling/v2beta2
kind: HorizontalPodAutoscaler
metadata:
  name: fastapi-metrics-hpa
  namespace: harvester-autoscaling-sim
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fastapi-metrics-app
  minReplicas: 1
  maxReplicas: 9
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 15
      policies:
      - type: Percent
        value: 100
        periodSeconds: 5
  metrics:
  - type: Pods
    pods:
      metric:
        name: simulated_user_load
      target:
        type: AverageValue
        averageValue: 100000
