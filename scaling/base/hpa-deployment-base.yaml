---
# hpa-deployment-base.yaml — Base Deployment for HPA Simulation
# Default strategy: topologySpreadConstraints (Gradual spread)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-metrics-app
  namespace: harvester-autoscaling-sim
  labels:
    app: fastapi-metrics
spec:
  selector:
    matchLabels:
      app: fastapi-metrics
  template:
    metadata:
      labels:
        app: fastapi-metrics
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - control
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule # Strict balance for homelab
        labelSelector:
          matchLabels:
            app: fastapi-metrics
      imagePullSecrets:
      - name: harbor-pullsecret
      containers:
      - name: fastapi
#        image: registry.home.kenchlightyear.com/library/scaling-fastapi:latest
        image: registry.home.kenchlightyear.com/library/scaling-fastapi:hpa-app-ci-qs7d9
        imagePullPolicy: Always
        securityContext:
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
