all:
  children:
    # Harvester Cluster (Primary)
    harvester:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
          control_node_ip: "192.168.2.123"
          control_node_user: "rancher"
          ssh_key_path: "~/.ssh/klti"
          kubeconfig_path: "~/.kube/harvester-k3s.yaml"
          base_domain: "home.kenchlightyear.com"
          repo_root: "/Users/joebertj/harvester"
          ingress_dir: "{{ repo_root }}/ingress"

    # DigitalOcean Managed Cluster (Backup)
    digitalocean:
      hosts:
        do-cluster:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
          repo_root: "/Users/joebertj/harvester"
          kubeconfig_path: "{{ repo_root }}/ansible/do-k3s.yaml"
          cloud_provider: "do"
          base_domain: "homelab.kenchlightyear.com"
          homelab_namespace: "homelab"
          ansible_user: "root"
          ansible_ssh_private_key_file: "~/.ssh/klti"
