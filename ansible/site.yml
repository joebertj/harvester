---
# site.yml — Master playbook: runs the full homelab ingress stack setup in order
# Usage:
#   ansible-playbook -i inventory.yml site.yml
#
# Run individual steps:
#   ansible-playbook -i inventory.yml playbooks/01-kubeconfig.yml
#   ansible-playbook -i inventory.yml playbooks/04-vault.yml
#
# Skip steps using tags:
#   ansible-playbook -i inventory.yml site.yml --skip-tags vault

- name: "Step 1 — Setup local prereqs"
  import_playbook: playbooks/01-prereqs.yml
  tags: [prereqs]

- name: "Step 2 — Fetch kubeconfig"
  import_playbook: playbooks/02-kubeconfig.yml
  tags: [kubeconfig]

- name: "Step 3 — Deploy and initialize Vault"
  import_playbook: playbooks/03-vault.yml
  tags: [vault]

- name: "Step 4 — Install External Secrets Operator"
  import_playbook: playbooks/04-external-secrets.yml
  tags: [eso, external-secrets]

- name: "Step 5 — Bootstrap Secrets & Policy"
  import_playbook: playbooks/05-secrets-bootstrap.yml
  tags: [secrets, policy]

- name: "Step 6 — Deploy Argo CD & Rollout Apps"
  import_playbook: playbooks/06-argocd-bootstrap.yml
  tags: [argo, gitops]
