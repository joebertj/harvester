---
# 09a-monitoring-secrets.yml
# One-time bootstrap for Grafana secrets in Vault
# Should be run BEFORE applying the Argo CD monitoring application

- name: Bootstrap Monitoring Secrets
  hosts: harvester
  gather_facts: false

  vars:
    letsencrypt_email: "{{ lookup('env', 'LETSENCRYPT_EMAIL') }}"

  tasks:
    - name: Ensure LETSENCRYPT_EMAIL is set
      ansible.builtin.fail:
        msg: "Please set LETSENCRYPT_EMAIL in secrets.env (or export it)"
      when: letsencrypt_email | length == 0

    - name: Ensure monitoring namespace exists
      ansible.builtin.command: kubectl create namespace monitoring
      environment:
        KUBECONFIG: "{{ kubeconfig_path | expanduser }}"
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Check if Grafana admin password exists in Vault
      ansible.builtin.shell: |
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        kubectl exec -n {{ vault_namespace }} vault-0 -- \
        vault kv get -field=admin-password homelab/monitoring/grafana
      register: grafana_password_check
      failed_when: false
      changed_when: false

    - name: Generate and store Grafana admin password if missing
      ansible.builtin.shell: |
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        NEW_PASS=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 20)
        kubectl exec -n {{ vault_namespace }} vault-0 -- \
        vault kv put homelab/monitoring/grafana admin-user="admin" admin-password="${NEW_PASS}"
      when: grafana_password_check.rc != 0
      changed_when: true
      no_log: true

    - name: Store Cert-Manager config in Vault
      ansible.builtin.shell: |
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        kubectl exec -n {{ vault_namespace }} vault-0 -- \
        vault kv put homelab/cert-manager/config email="{{ letsencrypt_email }}"
      changed_when: true
      no_log: true

    - name: Update ESO policy to include Monitoring and Cert-Manager
      ansible.builtin.shell: |
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        kubectl exec -i -n {{ vault_namespace }} vault-0 -- \
          vault policy write eso-policy - <<EOF
        $(kubectl exec -n {{ vault_namespace }} vault-0 -- vault policy read eso-policy | grep path)
        path "homelab/data/monitoring/grafana" { capabilities = ["read"] }
        path "homelab/data/cert-manager/config" { capabilities = ["read"] }
        path "homelab/data/argocd/admin" { capabilities = ["read"] }
        EOF
      args:
        executable: /bin/bash
      changed_when: true

    - name: Apply Grafana ExternalSecret (Manual Sync)
      ansible.builtin.command: >
        kubectl apply -f {{ ingress_dir }}/external-secrets/grafana-externalsecret.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path | expanduser }}"
      changed_when: true
