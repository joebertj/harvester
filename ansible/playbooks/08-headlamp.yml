---
# 08-headlamp.yml
# Deploys Headlamp — a modern Kubernetes UI — via Helm.
# Exposes it at https://headlamp.home.kenchlightyear.com
# and adds it to the Homer dashboard automatically.
#
# Usage:
#   ansible-playbook -i inventory.yml playbooks/10-headlamp.yml

- name: Deploy Headlamp Kubernetes Dashboard
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Add Headlamp Helm repo
      ansible.builtin.command: helm repo add headlamp https://kubernetes-sigs.github.io/headlamp/
      changed_when: false

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Install Headlamp via Helm
      ansible.builtin.command: >
        helm upgrade --install headlamp headlamp/headlamp
        --version 0.35.0
        --namespace {{ homelab_namespace }}
        --create-namespace
        --set ingress.enabled=false
        --set replicaCount=1
        --wait
      changed_when: true

    - name: Apply Headlamp IngressRoute
      ansible.builtin.command: >
        kubectl apply -f {{ ingress_dir }}/routes/headlamp-ingressroute.yaml
      changed_when: true

    - name: Wait for Headlamp to be ready
      ansible.builtin.command: >
        kubectl rollout status deployment/headlamp -n {{ homelab_namespace }} --timeout=120s
      changed_when: false

    - name: "✅ Headlamp deployed"
      ansible.builtin.debug:
        msg: |
          Headlamp is live!
          UI: https://headlamp.{{ base_domain }}
          To log in, generate a token:
            kubectl create token headlamp -n {{ homelab_namespace }}
