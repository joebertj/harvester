---
# 05-external-secrets.yml
# Installs External Secrets Operator and wires it to Vault

- name: Install External Secrets Operator
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Add External Secrets Helm repo
      ansible.builtin.command: helm repo add external-secrets https://charts.external-secrets.io
      changed_when: false

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Install External Secrets Operator
      ansible.builtin.command: >
        helm upgrade --install external-secrets external-secrets/external-secrets
        --namespace {{ external_secrets_namespace }}
        --create-namespace
        --version {{ external_secrets_version }}
        --set installCRDs=true
        --wait
      changed_when: true

    - name: Wait for ESO deployment
      ansible.builtin.command: >
        kubectl rollout status deployment/external-secrets
        -n {{ external_secrets_namespace }}
      changed_when: false

    - name: Apply ClusterSecretStore (Vault backend)
      ansible.builtin.command: >
        kubectl apply -f {{ ingress_dir }}/external-secrets/vault-secretstore.yaml
      changed_when: true

    - name: Apply ExternalSecret (Cloudflare token)
      ansible.builtin.command: >
        kubectl apply -f {{ ingress_dir }}/external-secrets/cloudflare-externalsecret.yaml
      changed_when: true

    - name: Wait for Cloudflare secret to be synced
      ansible.builtin.command: >
        kubectl wait externalsecret/cloudflare-api-token
        -n {{ cert_manager_namespace }}
        --for=condition=Ready
        --timeout=60s
      changed_when: false

    - name: Confirm secret exists in cert-manager namespace
      ansible.builtin.command: >
        kubectl get secret cloudflare-api-token -n {{ cert_manager_namespace }}
      register: secret_check
      changed_when: false

    - name: Show secret status
      ansible.builtin.debug:
        msg: "✅ cloudflare-api-token secret is ready in cert-manager namespace"
