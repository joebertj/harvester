---
# 09-tekton.yml
# Installs Tekton Pipelines, Triggers, and Dashboard
# Configures Harbor as a target registry for Tekton builds

- name: Deploy Tekton CI/CD
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Download and patch Tekton Pipelines (fix autoscaling/v2 issue)
      ansible.builtin.shell: |
        curl -fL https://storage.googleapis.com/tekton-releases/pipeline/previous/v0.44.0/release.yaml -o /tmp/tekton-pipelines.yaml
        sed -i '' 's/autoscaling\/v2/autoscaling\/v2beta2/g' /tmp/tekton-pipelines.yaml
        kubectl apply -f /tmp/tekton-pipelines.yaml
      changed_when: true

    - name: Download and patch Tekton Triggers
      ansible.builtin.shell: |
        curl -fL https://storage.googleapis.com/tekton-releases/triggers/previous/v0.24.0/release.yaml -o /tmp/tekton-triggers.yaml
        sed -i '' 's/autoscaling\/v2/autoscaling\/v2beta2/g' /tmp/tekton-triggers.yaml
        kubectl apply -f /tmp/tekton-triggers.yaml
      changed_when: true

    - name: Download and patch Tekton Dashboard
      ansible.builtin.shell: |
        curl -fL https://storage.googleapis.com/tekton-releases/dashboard/previous/v0.34.0/release.yaml -o /tmp/tekton-dashboard.yaml
        sed -i '' 's/autoscaling\/v2/autoscaling\/v2beta2/g' /tmp/tekton-dashboard.yaml
        kubectl apply -f /tmp/tekton-dashboard.yaml
      changed_when: true

    - name: "✅ Tekton core installed"
      ansible.builtin.debug:
        msg: "Tekton Pipelines, Triggers, and Dashboard have been applied. Dashboard is exposed via port-forward internal (setup Ingress for permanent use)."
