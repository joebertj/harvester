---
# 09-tekton.yml
# Installs Tekton Pipelines, Triggers, and Dashboard
# Configures Harbor as a target registry for Tekton builds

- name: Deploy Tekton CI/CD
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Add Tekton Dashboard Helm repo
      ansible.builtin.command: helm repo add tekton https://tekton-cd.github.io/dashboard
      changed_when: false

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Apply Tekton Pipelines
      ansible.builtin.command: >
        kubectl apply -f https://storage.googleapis.com/tekton-releases/pipeline/latest/release.yaml
      changed_when: true

    - name: Apply Tekton Triggers
      ansible.builtin.command: >
        kubectl apply -f https://storage.googleapis.com/tekton-releases/triggers/latest/release.yaml
      changed_when: true

    - name: Apply Tekton Dashboard
      ansible.builtin.command: >
        kubectl apply -f https://github.com/tektoncd/dashboard/releases/latest/download/tekton-dashboard-release.yaml
      changed_when: true

    - name: "✅ Tekton core installed"
      ansible.builtin.debug:
        msg: "Tekton Pipelines, Triggers, and Dashboard have been applied. Dashboard is exposed via port-forward internal (setup Ingress for permanent use)."
