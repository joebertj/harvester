---
# 15-hpa-simulation.yml
# Full lifecycle manager for the HPA scaling simulation.
# Handles common resources (Namespace/Service) and strategy-specific deployments.
#
# Usage:
#   ansible-playbook -i inventory.yml playbooks/15-hpa-simulation.yml -e strat=node-affinity
#
# Available Strategies:
#   - topology-spread
#   - node-affinity
#   - pod-anti-affinity

- name: HPA Scaling Simulation (Common + Strategy)
  hosts: harvester
  gather_facts: false
  vars:
    # Use hpa_ prefix to avoid reserved variable warnings
    # Pull from 'strat' variable to avoid reserved CLI name 'strategy'
    hpa_strategy: "{{ strat | default('topology-spread') }}"
    hpa_namespace: "harvester-autoscaling-sim"
    hpa_deployment: "fastapi-metrics-app"
    hpa_setup_common: "{{ setup_common | default(true) | bool }}"

  tasks:
    - name: "🏗️  Apply Common Resources (Namespace, Service, HPA)"
      ansible.builtin.shell: >
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        kubectl apply -f {{ repo_root }}/scaling/hpa-common.yaml
      when: hpa_setup_common
      register: common_result
      changed_when: "'configured' in common_result.stdout or 'created' in common_result.stdout"

    - name: "Validate Strategy File"
      ansible.builtin.stat:
        path: "{{ repo_root }}/scaling/hpa-{{ hpa_strategy }}.yaml"
      register: strategy_file

    - name: "Fail if strategy file is missing"
      ansible.builtin.fail:
        msg: "❌ Strategy file not found: scaling/hpa-{{ hpa_strategy }}.yaml"
      when: not strategy_file.stat.exists

    - name: "Get CURRENT active image from cluster"
      ansible.builtin.shell: >
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        kubectl get deployment {{ hpa_deployment }} -n {{ hpa_namespace }}
        -o jsonpath='{.spec.template.spec.containers[0].image}'
      register: current_image_raw
      failed_when: false
      changed_when: false

    - name: "Set image fact (fallback to :latest if deployment missing)"
      ansible.builtin.set_fact:
        current_image: "{{ current_image_raw.stdout if current_image_raw.stdout != '' else 'registry.home.kenchlightyear.com/library/scaling-fastapi:latest' }}"

    - name: "🚀 Applying Strategy: {{ hpa_strategy }}"
      ansible.builtin.shell: >
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        cat {{ repo_root }}/scaling/hpa-{{ hpa_strategy }}.yaml |
        sed "s|image: .*|image: {{ current_image }}|g" |
        kubectl apply -f -
      register: apply_result
      changed_when: "'configured' in apply_result.stdout or 'created' in apply_result.stdout"

    - name: "📦 Final Status"
      ansible.builtin.debug:
        msg: |
          Base setup:   {{ 'Success' if hpa_setup_common else 'Skipped' }}
          Strategy:     {{ hpa_strategy }}
          Active Image: {{ current_image }}

    - name: "⏳ Wait for Deployment Rollout"
      ansible.builtin.command: >
        kubectl rollout status deployment/{{ hpa_deployment }} -n {{ hpa_namespace }} --timeout=60s
      environment:
        KUBECONFIG: "{{ kubeconfig_path | expanduser }}"
      changed_when: false
