---
# do-09a-argo-events.yml
# Installs Argo Events on DOKS and configures CI automation for homelab.kenchlightyear.com

- name: Deploy Argo Events (DigitalOcean)
  hosts: digitalocean
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Create argo-events namespace
      ansible.builtin.command: kubectl create namespace argo-events
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Install Argo Events (stable)
      ansible.builtin.command: >
        kubectl apply -f https://raw.githubusercontent.com/argoproj/argo-events/stable/manifests/install.yaml
      changed_when: true

    - name: Deploy Default EventBus
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: EventBus
        metadata:
          name: default
          namespace: argo-events
        spec:
          nats:
            native: {}
        EOF
      changed_when: true

    - name: Apply Argo RBAC (DigitalOcean)
      ansible.builtin.command: kubectl apply -f {{ repo_root }}/argo/argo-rbac.yaml
      changed_when: true

    - name: Apply HPA App WorkflowTemplate
      ansible.builtin.command: kubectl apply -f {{ repo_root }}/argo/hpa-app-workflow-template.yaml
      changed_when: true

    - name: Apply DigitalOcean EventSource
      ansible.builtin.command: kubectl apply -f {{ repo_root }}/argo/do-hpa-app-eventsource.yaml
      changed_when: true

    - name: Apply DigitalOcean Sensor
      ansible.builtin.command: kubectl apply -f {{ repo_root }}/argo/do-hpa-app-sensor.yaml
      changed_when: true

    - name: Create Webhook IngressRoute (DigitalOcean)
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: traefik.containo.us/v1alpha1
        kind: IngressRoute
        metadata:
          name: hpa-app-webhook
          namespace: argo-events
        spec:
          entryPoints:
            - websecure
          routes:
            - match: Host(\`webhook.{{ base_domain }}\`)
              kind: Rule
              services:
                - name: hpa-app-webhook-eventsource-svc
                  port: 12000
          tls:
            secretName: webhook-tls
        EOF
      changed_when: true
