---
# 09-hpa-common.yml
# Deploys shared resources (Namespace, Service, HPA) for the autoscaling sim.
# This must be run before any of the 09a/b/c variant playbooks.
#
# Usage:
#   ansible-playbook -i inventory.yml playbooks/09-hpa-common.yml

- name: Deploy Shared HPA Resources
  hosts: harvester
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Apply shared HPA resources (Namespace, Service, HPA)
      ansible.builtin.command: >
        kubectl apply -f {{ repo_root }}/scaling/hpa-common.yaml
      changed_when: true
