---
# 06-ingress-stack.yml
# Applies Traefik config, TLS cert, backend services, IngressRoutes, and Homer dashboard

- name: Deploy ingress stack
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Configure Traefik via HelmChartConfig
      ansible.builtin.command: >
        kubectl apply -f {{ ingress_dir }}/traefik/traefik-config.yaml
      changed_when: true

    - name: Wait for Traefik to restart
      ansible.builtin.command: >
        kubectl rollout status deployment/traefik -n kube-system
      changed_when: false

    - name: Apply wildcard TLS certificate
      ansible.builtin.command: >
        kubectl apply -f {{ ingress_dir }}/cert-manager/wildcard-certificate.yaml
      changed_when: true

    - name: Wait for certificate to be issued
      ansible.builtin.command: >
        kubectl wait certificate/home-kenchlightyear-wildcard
        -n {{ homelab_namespace }}
        --for=condition=Ready
        --timeout=120s
      changed_when: false
      ignore_errors: true

    - name: Apply backend services (Harvester, KVM, SSH)
      ansible.builtin.command: >
        kubectl apply -f {{ ingress_dir }}/services/
      changed_when: true

    - name: Apply IngressRoutes
      ansible.builtin.command: >
        kubectl apply -f {{ ingress_dir }}/routes/
      changed_when: true

    - name: Create Homer assets ConfigMap
      ansible.builtin.shell: >
        kubectl create configmap homer-assets \
        --from-file=index.html="{{ ingress_dir }}/homer/index.html" \
        --from-file=preview.png="{{ ingress_dir }}/homer/preview.png" \
        -n {{ homelab_namespace }} \
        --dry-run=client -o yaml | kubectl apply -f -
      changed_when: true

    - name: Deploy Homer dashboard
      ansible.builtin.command: >
        kubectl apply -f {{ ingress_dir }}/homer/
      changed_when: true

    - name: Wait for Homer to be ready
      ansible.builtin.command: >
        kubectl rollout status deployment/homer -n {{ homelab_namespace }}
      changed_when: false

    - name: Verify all resources in homelab namespace
      ansible.builtin.command: kubectl get all -n {{ homelab_namespace }}
      register: homelab_resources
      changed_when: false

    - name: Show homelab resources
      ansible.builtin.debug:
        msg: "{{ homelab_resources.stdout_lines }}"

    - name: "✅ Ingress stack deployed"
      ansible.builtin.debug:
        msg: |
          Services are up! Browse to:
          - https://home.{{ base_domain }}
          - https://harvester.{{ base_domain }}
          - https://kvm.{{ base_domain }}
          - https://vault.{{ base_domain }}
