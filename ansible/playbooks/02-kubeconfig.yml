---
# 02-kubeconfig.yml
# Connects to the k3s control node (192.168.2.123) and fetches the kubeconfig locally.
# Runs entirely on localhost using SSH.

- name: Setup local kubeconfig
  hosts: harvester
  gather_facts: false

  tasks:
    - name: Ensure ~/.kube directory exists
      ansible.builtin.file:
        path: "{{ kubeconfig_path | dirname }}"
        state: directory
        mode: "0700"

    - name: Fetch kubeconfig from control node
      ansible.builtin.shell: |
        ssh -i {{ ssh_key_path }} \
            -o StrictHostKeyChecking=no \
            {{ control_node_user }}@{{ control_node_ip }} \
            "sudo cat /etc/rancher/k3s/k3s.yaml" \
          | sed 's/127.0.0.1/{{ control_node_ip }}/g' \
          > {{ kubeconfig_path }}
      args:
        executable: /bin/bash
      changed_when: true

    - name: Set secure permissions on kubeconfig
      ansible.builtin.file:
        path: "{{ kubeconfig_path }}"
        mode: "0600"

    - name: Verify cluster access
      ansible.builtin.command: kubectl get nodes
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: nodes_output
      changed_when: false

    - name: Show cluster nodes
      ansible.builtin.debug:
        msg: "{{ nodes_output.stdout_lines }}"
