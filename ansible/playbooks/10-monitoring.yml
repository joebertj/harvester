---
# 10-monitoring.yml
# Installs Prometheus Stack and Prometheus Adapter
# Enables Custom Metrics for HPA

- name: Deploy Monitoring Stack
  hosts: harvester
  gather_facts: false

  tasks:
    - name: Create monitoring namespace
      ansible.builtin.command: kubectl create namespace monitoring
      environment:
        KUBECONFIG: "{{ kubeconfig_path | expanduser }}"
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Add Prometheus Helm repos
      ansible.builtin.shell: |
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
      changed_when: false

    - name: Check if Grafana admin password exists in Vault
      ansible.builtin.shell: |
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        kubectl exec -n {{ vault_namespace }} vault-0 -- \
        vault kv get -field=admin-password homelab/monitoring/grafana
      register: grafana_password_check
      failed_when: false
      changed_when: false

    - name: Generate and store Grafana admin password if missing
      ansible.builtin.shell: |
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        NEW_PASS=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 20)
        kubectl exec -n {{ vault_namespace }} vault-0 -- \
        vault kv put homelab/monitoring/grafana admin-user="admin" admin-password="${NEW_PASS}"
      when: grafana_password_check.rc != 0
      changed_when: true
      no_log: true

    - name: Ensure ESO policy includes Grafana
      ansible.builtin.shell: |
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        kubectl exec -i -n {{ vault_namespace }} vault-0 -- \
          vault policy write eso-policy - <<EOF
        $(kubectl exec -n {{ vault_namespace }} vault-0 -- vault policy read eso-policy | grep path)
        path "homelab/data/monitoring/grafana" { capabilities = ["read"] }
        EOF
      args:
        executable: /bin/bash
      changed_when: true

    - name: Remove conflicting admission webhook configurations (Cleanup)
      ansible.builtin.shell: |
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        kubectl delete mutatingwebhookconfiguration prometheus-kube-prometheus-admission --ignore-not-found
        kubectl delete validatingwebhookconfiguration prometheus-kube-prometheus-admission --ignore-not-found
      changed_when: true

    - name: Install kube-prometheus-stack
      ansible.builtin.command: >
        helm upgrade --install prometheus prometheus-community/kube-prometheus-stack
        --version 34.1.1
        --namespace monitoring
        --set grafana.enabled=true
        --set grafana.admin.existingSecret=grafana-admin-credentials
        --set grafana.admin.userKey=admin-user
        --set grafana.admin.passwordKey=admin-password
        --set prometheus.prometheusSpec.podMonitorSelectorNilUsesHelmValues=false
        --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false
        --wait
      environment:
        KUBECONFIG: "{{ kubeconfig_path | expanduser }}"
      changed_when: true

    - name: Apply Grafana ExternalSecret
      ansible.builtin.command: >
        kubectl apply -f {{ ingress_dir }}/external-secrets/grafana-externalsecret.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path | expanduser }}"
      changed_when: true

    - name: Install Prometheus Adapter
      ansible.builtin.command: >
        helm upgrade --install prometheus-adapter prometheus-community/prometheus-adapter
        --version 3.3.0
        --namespace monitoring
        --values {{ repo_root }}/monitoring/prometheus-adapter-values.yaml
        --wait
      environment:
        KUBECONFIG: "{{ kubeconfig_path | expanduser }}"
      changed_when: true

    - name: Create ServiceMonitor for FastAPI
      ansible.builtin.shell: |
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        kubectl apply -f - <<EOF
        apiVersion: monitoring.coreos.com/v1
        kind: ServiceMonitor
        metadata:
          name: fastapi-metrics-sm
          namespace: monitoring
          labels:
            release: prometheus
        spec:
          selector:
            matchLabels:
              app: fastapi-metrics
          namespaceSelector:
            matchNames:
              - harvester-autoscaling-sim
          endpoints:
          - port: http
            path: /metrics
            interval: 15s
        EOF
      changed_when: true

    - name: Create Grafana Certificate (Harvester)
      ansible.builtin.shell: |
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        kubectl apply -f - <<EOF
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: grafana-tls
          namespace: monitoring
        spec:
          secretName: grafana-tls
          issuerRef:
            name: letsencrypt-cloudflare
            kind: ClusterIssuer
          dnsNames:
            - grafana.{{ base_domain }}
        EOF
      changed_when: true

    - name: Create Grafana IngressRoute (Harvester)
      ansible.builtin.shell: |
        KUBECONFIG={{ kubeconfig_path | expanduser }}
        kubectl apply -f - <<EOF
        apiVersion: traefik.containo.us/v1alpha1
        kind: IngressRoute
        metadata:
          name: grafana
          namespace: monitoring
        spec:
          entryPoints:
            - websecure
          routes:
            - match: Host(\`grafana.{{ base_domain }}\`)
              kind: Rule
              services:
                - name: prometheus-grafana
                  port: 80
          tls:
            secretName: grafana-tls
        EOF
      changed_when: true

    - name: "✅ Monitoring Stack installed"
      ansible.builtin.debug:
        msg: |
          Prometheus stack is deployed!
          Grafana URL: https://grafana.{{ base_domain }}
