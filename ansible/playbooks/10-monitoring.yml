---
# 10-monitoring.yml
# Installs Prometheus Stack and Prometheus Adapter
# Enables Custom Metrics for HPA

- name: Deploy Monitoring Stack
  hosts: harvester
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Create monitoring namespace
      ansible.builtin.command: kubectl create namespace monitoring
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Add Prometheus Helm repos
      ansible.builtin.shell: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
      changed_when: false

    - name: Install kube-prometheus-stack
      ansible.builtin.command: >
        helm upgrade --install prometheus prometheus-community/kube-prometheus-stack
        --version 34.1.1
        --namespace monitoring
        --set grafana.enabled=true
        --set prometheus.prometheusSpec.podMonitorSelectorNilUsesHelmValues=false
        --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false
        --wait
      changed_when: true

    - name: Install Prometheus Adapter
      ansible.builtin.command: >
        helm upgrade --install prometheus-adapter prometheus-community/prometheus-adapter
        --version 3.3.0
        --namespace monitoring
        --values {{ repo_root }}/monitoring/prometheus-adapter-values.yaml
        --wait
      changed_when: true

    - name: Create ServiceMonitor for FastAPI
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: monitoring.coreos.com/v1
        kind: ServiceMonitor
        metadata:
          name: fastapi-metrics-sm
          namespace: monitoring
          labels:
            release: prometheus
        spec:
          selector:
            matchLabels:
              app: fastapi-metrics
          namespaceSelector:
            matchNames:
              - harvester-autoscaling-sim
          endpoints:
          - port: http
            path: /metrics
            interval: 15s
        EOF
      changed_when: true

    - name: Create Grafana Certificate (Harvester)
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: grafana-tls
          namespace: monitoring
        spec:
          secretName: grafana-tls
          issuerRef:
            name: letsencrypt-cloudflare
            kind: ClusterIssuer
          dnsNames:
            - grafana.{{ base_domain }}
        EOF
      changed_when: true

    - name: Create Grafana IngressRoute (Harvester)
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: grafana
          namespace: monitoring
        spec:
          entryPoints:
            - websecure
          routes:
            - match: Host(\`grafana.{{ base_domain }}\`)
              kind: Rule
              services:
                - name: prometheus-grafana
                  port: 80
          tls:
            secretName: grafana-tls
        EOF
      changed_when: true

    - name: "✅ Monitoring Stack installed"
      ansible.builtin.debug:
        msg: |
          Prometheus stack is deployed!
          Grafana URL: https://grafana.{{ base_domain }}
