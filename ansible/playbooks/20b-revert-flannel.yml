---
# 20b-revert-flannel.yml
# Reverts the k3s cluster CNI from Cilium back to the default Flannel (vxlan).
# Removes Cilium and re-enables Flannel by restoring the k3s default config.
#
# Usage:
#   ansible-playbook -i inventory.yml playbooks/08b-revert-flannel.yml
#
# ⚠️  This will briefly disrupt cluster networking during the CNI swap.
#     Expect pods to restart. Do not run on a production workload.

- name: Revert to Flannel CNI (remove Cilium)
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Uninstall Cilium via Helm
      ansible.builtin.command: helm uninstall cilium -n kube-system
      failed_when: false
      changed_when: true

    - name: Delete Cilium CRDs and resources
      ansible.builtin.shell: |
        kubectl delete daemonset cilium -n kube-system --ignore-not-found=true
        kubectl delete deployment cilium-operator -n kube-system --ignore-not-found=true
        kubectl get crd | grep cilium | awk '{print $1}' | xargs -r kubectl delete crd
      args:
        executable: /bin/bash
      failed_when: false
      changed_when: true

    - name: Re-enable Flannel on the k3s control node via SSH
      ansible.builtin.shell: |
        ssh -i {{ ssh_key_path }} -o StrictHostKeyChecking=no \
          {{ control_node_user }}@{{ control_node_ip }} \
          "sudo sed -i '/flannel-backend: none/d' /etc/rancher/k3s/config.yaml && \
           sudo sed -i '/disable-network-policy: true/d' /etc/rancher/k3s/config.yaml && \
           sudo systemctl daemon-reload && \
           sudo systemctl restart k3s"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Wait for k3s API to become available again
      ansible.builtin.command: kubectl cluster-info
      register: cluster_ready
      until: cluster_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Restart all non-system pods to reattach to Flannel networking
      ansible.builtin.shell: |
        kubectl get pods -A --field-selector=metadata.namespace!=kube-system \
          -o json | jq -r '.items[] | "\(.metadata.namespace) \(.metadata.name)"' | \
        while read ns pod; do
          kubectl delete pod "$pod" -n "$ns" --grace-period=0 2>/dev/null || true
        done
      args:
        executable: /bin/bash
      changed_when: true

    - name: "✅ Flannel CNI restored"
      ansible.builtin.debug:
        msg: |
          Flannel CNI is back! The cluster is now using the default k3s networking.
          Check nodes: kubectl get nodes
          Check system pods: kubectl get pods -n kube-system
          To switch to Cilium: ansible-playbook -i inventory.yml playbooks/20a-install-cilium.yml
