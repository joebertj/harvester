---
# 04-vault.yml
# Installs Vault via Helm, initializes it, stores all secrets interactively

- name: Deploy and initialize Vault
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  vars:
    cloudflare_api_token: "{{ lookup('env', 'CF_API_TOKEN') }}"
    k3os_password: "{{ lookup('env', 'K3OS_PASSWORD') }}"
    k3os_token: "{{ lookup('env', 'K3OS_TOKEN') }}"
    ssh_authorized_key: "{{ lookup('env', 'SSH_AUTHORIZED_KEY') }}"

  tasks:
    - name: Ensure all secrets are provided in the environment
      ansible.builtin.fail:
        msg: "Missing required secrets. Did you 'source secrets.env'?"
      when: >
        cloudflare_api_token | length == 0 or
        k3os_password | length == 0 or
        k3os_token | length == 0 or
        ssh_authorized_key | length == 0

    - name: Add HashiCorp Helm repo
      ansible.builtin.command: helm repo add hashicorp https://helm.releases.hashicorp.com
      changed_when: false

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Install Vault via Helm
      ansible.builtin.command: >
        helm upgrade --install vault hashicorp/vault
        --namespace {{ vault_namespace }}
        --create-namespace
        --values {{ ingress_dir }}/vault/vault-values.yaml
        --wait
      register: vault_install
      changed_when: true

    - name: Wait for Vault pod to be Running (but not yet Ready)
      ansible.builtin.command: >
        kubectl get pod vault-0 -n {{ vault_namespace }}
      register: vault_pod_status
      until: "'Running' in vault_pod_status.stdout"
      retries: 24
      delay: 5
      changed_when: false

    - name: Check Vault initialization status
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_namespace }} vault-0 -- \
        vault status -format=json | grep -q '"initialized": true'
      register: vault_init_check
      failed_when: false
      changed_when: false

    - name: Initialize Vault
      ansible.builtin.command: >
        kubectl exec -n {{ vault_namespace }} vault-0 --
        vault operator init -key-shares=1 -key-threshold=1 -format=json
      register: vault_init_raw
      changed_when: true
      when: vault_init_check.rc != 0
      no_log: true

    - name: Save vault init output
      ansible.builtin.copy:
        content: "{{ vault_init_raw.stdout }}"
        dest: "{{ ingress_dir }}/vault/vault-init.json"
        mode: "0600"
      when: vault_init_check.rc != 0

    - name: Parse unseal key and root token
      ansible.builtin.set_fact:
        vault_unseal_key: "{{ (vault_init_raw.stdout | from_json).unseal_keys_b64[0] }}"
        vault_root_token: "{{ (vault_init_raw.stdout | from_json).root_token }}"
      when: vault_init_check.rc != 0
      no_log: true

    - name: "⚠️  IMPORTANT — back up vault-init.json now"
      ansible.builtin.debug:
        msg: |
          Vault has been initialized. vault-init.json is saved at:
          {{ ingress_dir }}/vault/vault-init.json
          BACK THIS UP TO A PASSWORD MANAGER, then delete it.
      when: vault_init_check.rc != 0

    - name: Unseal Vault
      ansible.builtin.command: >
        kubectl exec -n {{ vault_namespace }} vault-0 --
        vault operator unseal {{ vault_unseal_key }}
      changed_when: true
      when: vault_init_check.rc != 0
      no_log: true

    - name: Login to Vault
      ansible.builtin.command: >
        kubectl exec -n {{ vault_namespace }} vault-0 --
        vault login {{ vault_root_token }}
      changed_when: true
      when: vault_init_check.rc != 0
      no_log: true

    - name: Enable KV v2 secrets engine
      ansible.builtin.command: >
        kubectl exec -n {{ vault_namespace }} vault-0 --
        vault secrets enable -path=homelab kv-v2
      changed_when: true
      failed_when: false   # idempotent — ignores "already enabled"

    - name: Store Cloudflare API token
      ansible.builtin.command: >
        kubectl exec -n {{ vault_namespace }} vault-0 --
        vault kv put homelab/cloudflare api-token="{{ cloudflare_api_token }}"
      changed_when: true
      no_log: true

    - name: Check if Harbor admin password exists in Vault
      ansible.builtin.command: >
        kubectl exec -n {{ vault_namespace }} vault-0 --
        vault kv get -field=admin-password homelab/harbor
      register: harbor_password_check
      failed_when: false
      changed_when: false

    - name: Generate and store Harbor admin password if missing
      ansible.builtin.shell: |
        NEW_PASS=$(openssl rand -base64 18 | tr -dc 'a-zA-Z0-9' | head -c 16)
        kubectl exec -n {{ vault_namespace }} vault-0 -- \
        vault kv put homelab/harbor admin-password="${NEW_PASS}"
      when: harbor_password_check.rc != 0
      changed_when: true
      no_log: true

    - name: Store k3os credentials
      ansible.builtin.command: >
        kubectl exec -n {{ vault_namespace }} vault-0 --
        vault kv put homelab/k3os
        password="{{ k3os_password }}"
        token="{{ k3os_token }}"
      changed_when: true
      no_log: true

    - name: Store SSH authorized key
      ansible.builtin.command: >
        kubectl exec -n {{ vault_namespace }} vault-0 --
        vault kv put homelab/ssh authorized_key="{{ ssh_authorized_key }}"
      changed_when: true
      no_log: true

    - name: Create ESO Vault policy
      ansible.builtin.shell: |
        kubectl exec -i -n {{ vault_namespace }} vault-0 -- \
          vault policy write eso-policy - <<EOF
        path "homelab/data/cloudflare" { capabilities = ["read"] }
        path "homelab/data/harbor" { capabilities = ["read"] }
        path "homelab/data/headlamp" { capabilities = ["read"] }
        path "homelab/data/k3os" { capabilities = ["read"] }
        path "homelab/data/ssh" { capabilities = ["read"] }
        path "homelab/data/github-webhook" { capabilities = ["read"] }
        path "homelab/data/wireguard/*" { capabilities = ["read"] }
        EOF
      args:
        executable: /bin/bash
      changed_when: true

    - name: Enable Kubernetes auth in Vault
      ansible.builtin.command: >
        kubectl exec -n {{ vault_namespace }} vault-0 --
        vault auth enable kubernetes
      changed_when: true
      failed_when: false

    - name: Configure Kubernetes auth
      ansible.builtin.shell: |
        KUBE_HOST=$(kubectl config view --raw \
          -o jsonpath='{.clusters[0].cluster.server}')
        kubectl exec -n {{ vault_namespace }} vault-0 -- \
          vault write auth/kubernetes/config \
            kubernetes_host="$KUBE_HOST"
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: true

    - name: Create Kubernetes auth role for ESO
      ansible.builtin.command: >
        kubectl exec -n {{ vault_namespace }} vault-0 --
        vault write auth/kubernetes/role/eso-role
        bound_service_account_names=external-secrets
        bound_service_account_namespaces=external-secrets
        policies=eso-policy
        ttl=1h
      changed_when: true

    - name: "✅ Vault setup complete"
      ansible.builtin.debug:
        msg: "Vault is initialized and configured. Remember to back up vault-init.json!"
