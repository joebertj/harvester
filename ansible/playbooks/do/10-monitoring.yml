---
# do-10-monitoring.yml
# Installs Prometheus Stack and Prometheus Adapter on DigitalOcean (DOKS)
# Uses homelab.kenchlightyear.com

- name: Deploy Monitoring Stack (DigitalOcean)
  hosts: digitalocean
  gather_facts: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Create monitoring namespace
      ansible.builtin.command: kubectl create namespace monitoring
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Add Prometheus Helm repos
      ansible.builtin.shell: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
      changed_when: false

    - name: Install kube-prometheus-stack (v1.35 compatible)
      ansible.builtin.command: >
        helm upgrade --install prometheus prometheus-community/kube-prometheus-stack
        --namespace monitoring
        --set grafana.enabled=true
        --set prometheus.prometheusSpec.podMonitorSelectorNilUsesHelmValues=false
        --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false
        --wait
      changed_when: true

    - name: Install Prometheus Adapter
      ansible.builtin.command: >
        helm upgrade --install prometheus-adapter prometheus-community/prometheus-adapter
        --namespace monitoring
        --values {{ repo_root }}/monitoring/do/prometheus-adapter-values.yaml
        --wait
      changed_when: true

    - name: Create Grafana Certificate (DigitalOcean)
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: grafana-tls
          namespace: monitoring
        spec:
          secretName: grafana-tls
          issuerRef:
            name: letsencrypt-cloudflare
            kind: ClusterIssuer
          dnsNames:
            - grafana.{{ base_domain }}
        EOF
      changed_when: true

    - name: Create Grafana IngressRoute (DigitalOcean)
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: grafana
          namespace: monitoring
        spec:
          entryPoints:
            - websecure
          routes:
            - match: Host(\`grafana.{{ base_domain }}\`)
              kind: Rule
              services:
                - name: prometheus-grafana
                  port: 80
          tls:
            secretName: grafana-tls
        EOF
      changed_when: true
