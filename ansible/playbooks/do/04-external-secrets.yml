---
# do-05-external-secrets.yml
# Installs External Secrets Operator on DOKS and configures the ClusterSecretStore for DO Vault.

- name: Deploy External Secrets Operator (DigitalOcean)
  hosts: digitalocean
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Create external-secrets namespace
      ansible.builtin.command: kubectl create namespace external-secrets
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Add ESO Helm repo
      ansible.builtin.command: helm repo add external-secrets https://charts.external-secrets.io
      changed_when: false

    - name: Install ESO via Helm
      ansible.builtin.command: >
        helm upgrade --install external-secrets external-secrets/external-secrets
        --namespace external-secrets
        --set installCRDs=true
        --wait
      changed_when: true

    - name: Wait for ESO CRDs to be ready
      ansible.builtin.command: >
        kubectl wait --for=condition=Established crd/{{ item }} --timeout=60s
      loop:
        - clustersecretstores.external-secrets.io
        - externalsecrets.external-secrets.io
      changed_when: false

    - name: Create ClusterSecretStore for DigitalOcean Vault
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: external-secrets.io/v1
        kind: ClusterSecretStore
        metadata:
          name: vault-backend
        spec:
          provider:
            vault:
              server: "http://vault.vault.svc.cluster.local:8200"
              path: "homelab"
              version: "v2"
              auth:
                kubernetes:
                  mountPath: "kubernetes"
                  role: "eso-role"
        EOF
      changed_when: true
