---
# do-15-hpa-common.yml
# Deploys the HPA simulation app on DigitalOcean (DOKS)

- name: Deploy HPA App (DigitalOcean)
  hosts: digitalocean
  gather_facts: false
  environment:
    KUBECONFIG: "/Users/joebertj/harvester/ansible/do-k3s.yaml"

  tasks:
    - name: Create autoscaling namespace
      ansible.builtin.command: kubectl create namespace harvester-autoscaling-sim
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Apply HPA Application (DigitalOcean)
      ansible.builtin.command: kubectl apply -f {{ repo_root }}/scaling/do/hpa-common.yaml
      changed_when: true

    - name: Create Application Certificate (DigitalOcean)
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: hpa-app-tls
          namespace: harvester-autoscaling-sim
        spec:
          secretName: hpa-app-tls
          issuerRef:
            name: letsencrypt-cloudflare
            kind: ClusterIssuer
          dnsNames:
            - app.{{ base_domain }}
        EOF
      changed_when: true

    - name: Create Application IngressRoute (DigitalOcean)
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: hpa-app
          namespace: harvester-autoscaling-sim
        spec:
          entryPoints:
            - websecure
          routes:
            - match: Host(\`app.{{ base_domain }}\`)
              kind: Rule
              services:
                - name: fastapi-metrics-service
                  port: 80
          tls:
            secretName: hpa-app-tls
        EOF
      changed_when: true
