---
# do-07-registry.yml
# Installs Harbor Registry on DOKS

- name: Deploy Harbor Registry (DigitalOcean)
  hosts: digitalocean
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Create harbor namespace
      ansible.builtin.command: kubectl create namespace harbor
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Add Harbor Helm repo
      ansible.builtin.command: helm repo add harbor https://helm.goharbor.io
      changed_when: false

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Apply Harbor ExternalSecret (DigitalOcean)
      ansible.builtin.command: >
        kubectl apply -f {{ repo_root }}/ingress/harbor/harbor-externalsecret.yaml -n {{ homelab_namespace }}
      changed_when: true

    - name: Wait for Harbor ExternalSecret to sync
      ansible.builtin.command: >
        kubectl wait externalsecret harbor-admin-password
        -n {{ homelab_namespace }}
        --for=condition=Ready
        --timeout=60s
      changed_when: false

    - name: Create Harbor Values for DO
      ansible.builtin.copy:
        content: |
          expose:
            type: ingress
            tls:
              enabled: true
              certSource: secret
              secret:
                secretName: harbor-tls
            ingress:
              hosts:
                core: registry.homelab.kenchlightyear.com
              annotations:
                traefik.ingress.kubernetes.io/router.entrypoints: websecure
                cert-manager.io/cluster-issuer: letsencrypt-cloudflare
          externalURL: https://registry.homelab.kenchlightyear.com
          persistence:
            enabled: true
            resourcePolicy: "keep"
        dest: "{{ repo_root }}/ingress/harbor/do/harbor-values.yaml"
        mode: "0644"

    - name: Install Harbor via Helm
      ansible.builtin.command: >
        helm upgrade --install harbor harbor/harbor
        --namespace {{ homelab_namespace }}
        --values {{ repo_root }}/ingress/harbor/do/harbor-values.yaml
        --wait
      changed_when: true
