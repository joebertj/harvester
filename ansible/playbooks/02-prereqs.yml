---
# 02-prereqs.yml
# Checks and installs local prerequisites: helm and kubectl

- name: Verify and install prerequisites
  hosts: localhost
  gather_facts: true

  tasks:
    - name: Check helm is installed
      ansible.builtin.command: helm version --short
      register: helm_check
      failed_when: false
      changed_when: false

    - name: Install helm (macOS via brew)
      ansible.builtin.command: brew install helm
      when:
        - helm_check.rc != 0
        - ansible_facts['os_family'] == "Darwin"
      changed_when: true

    - name: Install helm (Linux)
      ansible.builtin.shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        executable: /bin/bash
      when:
        - helm_check.rc != 0
        - ansible_facts['os_family'] != "Darwin"
      changed_when: true

    - name: Confirm helm version
      ansible.builtin.command: helm version --short
      register: helm_version
      changed_when: false

    - name: Show helm version
      ansible.builtin.debug:
        msg: "✅ {{ helm_version.stdout }}"

    - name: Check kubectl is installed
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      failed_when: false
      changed_when: false

    - name: Install kubectl (macOS via brew)
      ansible.builtin.command: brew install kubectl
      when:
        - kubectl_check.rc != 0
        - ansible_facts['os_family'] == "Darwin"
      changed_when: true

    - name: Confirm kubectl version
      ansible.builtin.command: kubectl version --client
      register: kubectl_version
      changed_when: false
      ignore_errors: true

    - name: Show kubectl version
      ansible.builtin.debug:
        msg: "✅ kubectl is ready"

    - name: Verify cluster is reachable
      ansible.builtin.command: kubectl cluster-info
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: false
