---
# do-06-ingress-stack.yml
# Installs Traefik on DOKS and configures the DigitalOcean LoadBalancer.

- name: Deploy Traefik (DigitalOcean)
  hosts: digitalocean
  gather_facts: false
  environment:
    KUBECONFIG: "/Users/joebertj/harvester/ansible/do-k3s.yaml"

  tasks:
    - name: Create traefik namespace
      ansible.builtin.command: kubectl create namespace traefik
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Add Traefik Helm repo
      ansible.builtin.command: helm repo add traefik https://helm.traefik.io/traefik
      changed_when: false

    - name: Install Traefik via Helm
      ansible.builtin.command: >
        helm upgrade --install traefik traefik/traefik
        --namespace traefik
        --set service.type=LoadBalancer
        --set ports.web.http.redirections.entryPoint.to=websecure
        --set ports.web.http.redirections.entryPoint.scheme=https
        --skip-crds
        --wait
      changed_when: true

    - name: Wait for LoadBalancer IP
      ansible.builtin.shell: |
        kubectl get svc traefik -n traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
      register: lb_ip
      until: lb_ip.stdout | length > 0
      retries: 20
      delay: 10
      changed_when: false

    - name: Create homelab namespace
      ansible.builtin.command: kubectl create namespace homelab
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Deploy Homer dashboard (DigitalOcean)
      ansible.builtin.shell: |
        kubectl apply -n homelab -f - <<EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: homer
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: homer
          template:
            metadata:
              labels:
                app: homer
            spec:
              containers:
              - name: homer
                image: b4bz/homer:latest
                ports:
                - containerPort: 8080
                volumeMounts:
                - name: config
                  mountPath: /www/assets/config.yml
                  subPath: config.yml
              volumes:
              - name: config
                configMap:
                  name: homer-config
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: homer
        spec:
          ports:
          - port: 80
            targetPort: 8080
          selector:
            app: homer
        ---
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: homer-config
        data:
          config.yml: |
            title: "Homelab DO Dashboard"
            subtitle: "DigitalOcean Backup Cluster"
            logo: "https://upload.wikimedia.org/wikipedia/commons/f/ff/DigitalOcean_logo.svg"
            columns: 3
            links:
              - name: "Harvester Primary"
                icon: "fas fa-server"
                url: "https://home.kenchlightyear.com"
              - name: "KVM"
                icon: "fas fa-virtual-machine"
                url: "https://kvm.home.kenchlightyear.com"
            services:
              - name: "Infrastructure"
                icon: "fas fa-cloud"
                items:
                  - name: "Harbor"
                    logo: "https://goharbor.io/img/harbor-logo.svg"
                    subtitle: "Container Registry"
                    url: "https://registry.homelab.kenchlightyear.com"
                  - name: "Vault"
                    logo: "https://www.vaultproject.io/img/vault-logo-white.svg"
                    subtitle: "Secrets"
                    url: "https://vault.homelab.kenchlightyear.com"
                  - name: "Headlamp"
                    subtitle: "Cluster UI"
                    url: "https://headlamp.homelab.kenchlightyear.com"
                  - name: "Argo Workflows"
                    subtitle: "CI/CD"
                    url: "https://argo.homelab.kenchlightyear.com"
        ---
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: homer
          namespace: homelab
        spec:
          entryPoints:
            - websecure
          routes:
            - match: Host(\`{{ base_domain }}\`)
              kind: Rule
              services:
                - name: homer
                  port: 80
          tls:
            secretName: homer-tls
        ---
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: homer-tls
          namespace: homelab
        spec:
          secretName: homer-tls
          issuerRef:
            name: letsencrypt-cloudflare
            kind: ClusterIssuer
          dnsNames:
            - {{ base_domain }}
        EOF
      changed_when: true

    - name: Display LoadBalancer IP
      ansible.builtin.debug:
        msg: "DigitalOcean LoadBalancer IP is: {{ lb_ip.stdout }}. Please point *.homelab.kenchlightyear.com to this IP."
