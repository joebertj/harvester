---
# 09a-argo-events.yml
# Installs Argo Events (Controller, EventBus)

- name: Deploy Argo Events
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Create argo-events namespace
      ansible.builtin.command: kubectl create namespace argo-events
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Install Argo Events (stable)
      ansible.builtin.command: >
        kubectl apply -f https://raw.githubusercontent.com/argoproj/argo-events/stable/manifests/install.yaml
      changed_when: true

    - name: Deploy Default EventBus
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: EventBus
        metadata:
          name: default
          namespace: argo-events
        spec:
          nats:
            native: {}
        EOF
      changed_when: true

    - name: Apply Harbor ExternalSecret (Sync from Vault)
      ansible.builtin.command: >
        kubectl apply -f {{ repo_root }}/argo/harbor-externalsecret.yaml
      changed_when: true

    - name: Apply Argo Workflow RBAC
      ansible.builtin.command: >
        kubectl apply -f {{ repo_root }}/argo/argo-rbac.yaml
      changed_when: true

    - name: Apply HPA App WorkflowTemplate
      ansible.builtin.command: >
        kubectl apply -f {{ repo_root }}/argo/hpa-app-workflow-template.yaml
      changed_when: true

    - name: Apply Webhook ExternalSecret (Sync from Vault)
      ansible.builtin.command: >
        kubectl apply -f {{ repo_root }}/argo/webhook-externalsecret.yaml
      changed_when: true

    - name: Apply Argo EventSource (Webhook Listener)
      ansible.builtin.command: >
        kubectl apply -f {{ repo_root }}/argo/hpa-app-eventsource.yaml
      changed_when: true

    - name: Apply Argo Events RBAC
      ansible.builtin.command: >
        kubectl apply -f {{ repo_root }}/argo/argo-events-rbac.yaml
      changed_when: true

    - name: Apply Argo Sensor (Workflow Trigger)
      ansible.builtin.command: >
        kubectl apply -f {{ repo_root }}/argo/hpa-app-sensor.yaml
      changed_when: true

    - name: Apply Webhook IngressRoute
      ansible.builtin.command: >
        kubectl apply -f {{ repo_root }}/ingress/routes/argo-events-ingressroute.yaml
      changed_when: true

    - name: "✅ Argo Events and CI automation ready"
      ansible.builtin.debug:
        msg: "Argo Events components, Secure Registry Secret (via ESO), and WorkflowTemplate have been deployed."
