---
# 07-registry.yml
# Installs Harbor Registry via Helm

- name: Deploy Harbor Registry
  hosts: harvester
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Add Harbor Helm repo
      ansible.builtin.command: helm repo add harbor https://helm.goharbor.io
      changed_when: false

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Apply Harbor ExternalSecret
      ansible.builtin.command: >
        kubectl apply -f {{ ingress_dir }}/harbor/harbor-externalsecret.yaml
      changed_when: true

    - name: Wait for Harbor ExternalSecret to sync
      ansible.builtin.command: >
        kubectl wait externalsecret harbor-admin-password
        -n {{ homelab_namespace }}
        --for=condition=Ready
        --timeout=60s
      changed_when: false

    - name: Install Harbor via Helm
      ansible.builtin.command: >
        helm upgrade --install harbor harbor/harbor
        --namespace {{ homelab_namespace }}
        --values {{ ingress_dir }}/harbor/harbor-values.yaml
        --wait
      register: harbor_install
      changed_when: true

    - name: "✅ Harbor Registry deployed"
      ansible.builtin.debug:
        msg: |
          Harbor is active! Reachable at:
          https://registry.{{ base_domain }}
          Secured via Vault & ExternalSecrets!
