---
# do-09-argo-workflows.yml
# Installs Argo Workflows on DigitalOcean (DOKS) via Helm.
# Uses homelab.kenchlightyear.com

- name: Deploy Argo Workflows (DigitalOcean)
  hosts: digitalocean
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Ensure argo namespace exists
      ansible.builtin.command: kubectl create namespace argo
      register: ns_create
      failed_when: false
      changed_when: "'created' in ns_create.stdout"

    - name: Add Argo Helm repo
      ansible.builtin.command: helm repo add argo https://argoproj.github.io/argo-helm
      failed_when: false
      changed_when: false

    - name: Install Argo Workflows via Helm
      ansible.builtin.command: >
        helm upgrade --install argo argo/argo-workflows
        --namespace argo
        --set server.extraArgs={--auth-mode=server,--secure=false}
        --wait
      changed_when: true

    - name: Create Argo Certificate (DigitalOcean)
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: argo-server-tls
          namespace: argo
        spec:
          secretName: argo-server-tls
          issuerRef:
            name: letsencrypt-cloudflare
            kind: ClusterIssuer
          dnsNames:
            - argo.{{ base_domain }}
        EOF
      changed_when: true

    - name: Create Argo IngressRoute (DigitalOcean)
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: argo-server
          namespace: argo
        spec:
          entryPoints:
            - websecure
          routes:
            - match: Host(\`argo.{{ base_domain }}\`)
              kind: Rule
              services:
                - name: argo-server
                  port: 2746
          tls:
            secretName: argo-server-tls
        EOF
      changed_when: true
