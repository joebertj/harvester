---
# 09a-hpa-topology-spread.yml
# Deploys HPA Variant A — topologySpreadConstraints
# Pods spread evenly across available nodes (max 1 pod skew per node).
# Harvester provisions new VMs only when existing nodes are resource-saturated.
#
# Usage:
#   ansible-playbook -i inventory.yml playbooks/09a-hpa-topology-spread.yml
#
# Tear down:
#   ansible-playbook -i inventory.yml playbooks/09a-hpa-topology-spread.yml --tags teardown

- name: Deploy HPA Variant A — Topology Spread
  hosts: localhost
  gather_facts: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

  tasks:
    - name: Apply Variant A — topologySpreadConstraints Deployment
      ansible.builtin.command: >
        kubectl apply -f {{ repo_root }}/scaling/hpa-topology-spread.yaml
      changed_when: true
      tags: [deploy]

    - name: Wait for Deployment to be ready
      ansible.builtin.command: >
        kubectl rollout status deployment/fastapi-metrics-app
        -n harvester-autoscaling-sim
        --timeout=120s
      changed_when: false
      tags: [deploy]

    - name: "✅ Variant A deployed"
      ansible.builtin.debug:
        msg: |
          HPA Variant A (topologySpreadConstraints) is live!
          Watch pods:    kubectl get pods -n harvester-autoscaling-sim -w
          Watch HPA:     kubectl get hpa -n harvester-autoscaling-sim -w
          Watch nodes:   kubectl get nodes -w
      tags: [deploy]

    - name: Tear down Variant A Deployment
      ansible.builtin.command: >
        kubectl delete -f {{ repo_root }}/scaling/hpa-topology-spread.yaml
      failed_when: false
      changed_when: true
      tags: [teardown, never]

    - name: Tear down shared HPA resources
      ansible.builtin.command: >
        kubectl delete -f {{ repo_root }}/scaling/hpa-common.yaml
      failed_when: false
      changed_when: true
      tags: [teardown, never]
