# -------------------------------------------------------
# Deployment Variant: podAntiAffinity (strict)
#
# Each pod is REQUIRED to run on a unique node.
# If the HPA scales to N replicas but only M nodes exist,
# N-M pods will stay Pending — directly triggering the
# Harvester Cluster Autoscaler to provision new worker VMs.
#
# Best for: Demonstrating strict 1-pod-per-VM autoscaling
# where every new replica forces a new Harvester worker.
#
# Apply after hpa-common.yaml:
#   kubectl apply -f hpa-common.yaml
#   kubectl apply -f hpa-pod-anti-affinity.yaml
# -------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-metrics-app
  namespace: harvester-autoscaling-sim
  labels:
    app: fastapi-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-metrics
  template:
    metadata:
      labels:
        app: fastapi-metrics
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: fastapi-metrics
            topologyKey: kubernetes.io/hostname
      containers:
      - name: fastapi
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args:
        - "pip install fastapi uvicorn prometheus-client numpy && python /app/main.py"
        ports:
        - containerPort: 8000
          name: http
        volumeMounts:
        - name: script-volume
          mountPath: /app
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: script-volume
        configMap:
          name: fastapi-metrics-script
