---
# Endpoints + Service for Nano KVM UI at 192.168.2.129:443

apiVersion: v1
kind: Endpoints
metadata:
  name: kvm-ui
  namespace: homelab
subsets:
  - addresses:
      - ip: 192.168.2.129
    ports:
      - port: 443
        protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: kvm-ui
  namespace: homelab
spec:
  ports:
    - port: 443
      targetPort: 443
      protocol: TCP
  clusterIP: None   # headless — uses manual Endpoints above
