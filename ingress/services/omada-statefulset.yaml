apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: omada
  namespace: homelab
spec:
  serviceName: omada
  replicas: 1
  selector:
    matchLabels:
      app: omada
  template:
    metadata:
      labels:
        app: omada
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - work-3
      initContainers:
        - name: configure-wireguard
          image: alpine:latest
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
          command:
            - /bin/sh
            - -c
            - "apk add --no-cache wireguard-tools iptables && wg-quick up /etc/wireguard/wg0.conf"
          volumeMounts:
            - name: wg-config
              mountPath: /etc/wireguard/wg0.conf
              subPath: wg0.conf
              readOnly: true
      containers:
        - name: omada
          image: registry.home.kenchlightyear.com/library/omada:5.15.24.19
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: 2Gi
            limits:
              memory: 4Gi
          ports:
            - name: https-ui
              containerPort: 8043
              protocol: TCP
          volumeMounts:
            - name: omada-data
              mountPath: /opt/tplink/EAPController/data
            - name: omada-logs
              mountPath: /opt/tplink/EAPController/logs
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_BIND_SERVICE
                - SETFCAP
                - SETPCAP
      volumes:
        - name: wg-config
          secret:
            secretName: omada-wg-config
  volumeClaimTemplates:
    - metadata:
        name: omada-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
    - metadata:
        name: omada-logs
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

