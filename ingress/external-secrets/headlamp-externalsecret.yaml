apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: headlamp-token
  namespace: homelab
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: headlamp-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: headlamp
        property: headlamp-token
