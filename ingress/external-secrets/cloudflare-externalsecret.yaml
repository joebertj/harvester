---
# ExternalSecret — syncs the Cloudflare API token from Vault into a K8s Secret
# that cert-manager can read for DNS-01 challenges
#
# Vault path: homelab/data/cloudflare  (key: api-token)
# Produces:   K8s Secret "cloudflare-api-token" in namespace "cert-manager"

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: "1h"           # re-sync every hour
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token    # name of the K8s Secret to create
    creationPolicy: Owner         # ESO owns and manages this secret
  data:
    - secretKey: api-token        # key inside the K8s Secret
      remoteRef:
        key: cloudflare           # Vault KV path (homelab/data/cloudflare)
        property: api-token       # field inside the Vault secret
