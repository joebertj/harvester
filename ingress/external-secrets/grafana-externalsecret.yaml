---
# ExternalSecret — syncs the Grafana admin credentials from Vault into a K8s Secret
#
# Vault path: homelab/data/monitoring/grafana (keys: admin-user, admin-password)
# Produces:   K8s Secret "grafana-admin-credentials" in namespace "monitoring"

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: monitoring/grafana
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: monitoring/grafana
        property: admin-password
