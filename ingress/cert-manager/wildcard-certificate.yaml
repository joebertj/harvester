---
# Wildcard TLS certificate for *.home.kenchlightyear.com
# Covers all subdomains: harvester.home.*, kvm.home.*, etc.
# Also covers the root home.kenchlightyear.com

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-kenchlightyear-wildcard
  namespace: homelab
spec:
  secretName: home-kenchlightyear-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  commonName: "*.home.kenchlightyear.com"
  dnsNames:
    - "home.kenchlightyear.com"
    - "*.home.kenchlightyear.com"
  privateKey:
    algorithm: ECDSA
    size: 256
