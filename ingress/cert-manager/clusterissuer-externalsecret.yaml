---
# ExternalSecret for Cert-Manager ClusterIssuer
# Syncs the ACME email from Vault and templates the ClusterIssuer resource

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: letsencrypt-issuer-config
  namespace: cert-manager
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: letsencrypt-issuer-rendered # Not really used, but targets the template
    template:
      engineVersion: v2
      data:
        # This will produce the ClusterIssuer resource automatically
        clusterissuer.yaml: |
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-cloudflare
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: {{ .email }}
              privateKeySecretRef:
                name: letsencrypt-cloudflare-account-key
              solvers:
                - dns01:
                    cloudflare:
                      apiTokenSecretRef:
                        name: cloudflare-api-token
                        key: api-token
                  selector:
                    dnsZones:
                      - "kenchlightyear.com"
  data:
    - secretKey: email
      remoteRef:
        key: cert-manager/config
        property: email
