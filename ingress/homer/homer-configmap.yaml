---
# Homer Dashboard — config.yml
# Edit this to add or remove services

apiVersion: v1
kind: ConfigMap
metadata:
  name: homer-config
  namespace: homelab
data:
  config.yml: |
    ---
    title: "Home Lab"
    subtitle: "kenchlightyear.com"
    logo: "logo.png"
    header: true
    footer: false

    theme: default
    colors:
      light:
        highlight-primary: "#3367d6"
        highlight-secondary: "#4285f4"
        highlight-hover: "#5a95f5"
        background: "#f2f2f2"
        card-background: "#ffffff"
        text: "#363636"
        text-header: "#ffffff"
        text-title: "#303030"
        text-subtitle: "#424242"
        card-shadow: rgba(0, 0, 0, 0.1)
        link: "#3273dc"
        link-hover: "#363636"
      dark:
        highlight-primary: "#3367d6"
        highlight-secondary: "#4285f4"
        highlight-hover: "#5a95f5"
        background: "#131313"
        card-background: "#2b2b2b"
        text: "#eaeaea"
        text-header: "#ffffff"
        text-title: "#fafafa"
        text-subtitle: "#f5f5f5"
        card-shadow: rgba(0, 0, 0, 0.4)
        link: "#3273dc"
        link-hover: "#ffdd57"

    message:
      style: "is-dark"
      title: "Welcome"
      content: "Homelab dashboard for kenchlightyear.com"

    services:
      - name: "Infrastructure"
        icon: "fas fa-server"
        items:
          - name: "Harvester"
            logo: "https://www.rancher.com/assets/img/logos/rancher-suse-logo-horizontal-color.png"
            subtitle: "Bare metal hypervisor & VM management"
            tag: "homelab"
            url: "https://harvester.home.kenchlightyear.com"
            target: "_blank"

          - name: "Nano KVM"
            logo: "https://avatars.githubusercontent.com/u/1771274"
            subtitle: "Remote KVM / IP console"
            tag: "homelab"
            url: "https://kvm.home.kenchlightyear.com"
            target: "_blank"

          - name: "Vault"
            icon: "fas fa-key"
            subtitle: "Secrets management"
            tag: "security"
            url: "https://vault.home.kenchlightyear.com"
            target: "_blank"

          - name: "Harbor"
            logo: "https://goharbor.io/img/logos/harbor-icon-color.png"
            subtitle: "Enterprise container registry"
            tag: "infrastructure"
            url: "https://registry.home.kenchlightyear.com"
            target: "_blank"

          - name: "Argo Workflows"
            logo: "https://raw.githubusercontent.com/argoproj/argo-workflows/main/docs/assets/argo.png"
            subtitle: "Modern CI/CD Engine"
            tag: "cicd"
            url: "https://argo.home.kenchlightyear.com"
            target: "_blank"

          - name: "Headlamp"
            logo: "https://headlamp.dev/img/logo.svg"
            subtitle: "Kubernetes cluster explorer"
            tag: "observability"
            url: "https://headlamp.home.kenchlightyear.com"
            target: "_blank"

          - name: "Argo CD"
            logo: "https://raw.githubusercontent.com/argoproj/argo-cd/master/ui/src/assets/images/argo.png"
            subtitle: "GitOps Continuous Deployment"
            tag: "cicd"
            url: "https://argocd.home.kenchlightyear.com"
            target: "_blank"

          - name: "Grafana"
            logo: "https://upload.wikimedia.org/wikipedia/commons/a/a1/Grafana_logo.svg"
            subtitle: "Metrics & Dashboards"
            tag: "observability"
            url: "https://grafana.home.kenchlightyear.com"
            target: "_blank"

          - name: "Omada"
            icon: "fas fa-network-wired"
            subtitle: "Network controller UI"
            tag: "infrastructure"
            url: "https://omada.home.kenchlightyear.com"
            target: "_blank"

          - name: "Kyverno"
            icon: "fas fa-shield-alt"
            subtitle: "Policy engine & compliance reports"
            tag: "security"
            url: "https://kyverno.home.kenchlightyear.com"
            target: "_blank"
