---
# IngressRoute for Nano KVM UI
# → https://kvm.home.kenchlightyear.com → 192.168.2.129:443

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kvm-ui
  namespace: homelab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`kvm.home.kenchlightyear.com`)
      kind: Rule
      services:
        - name: kvm-ui
          port: 443
          scheme: https          # backend speaks HTTPS
          serversTransport: insecure-transport
  tls:
    secretName: home-kenchlightyear-tls
