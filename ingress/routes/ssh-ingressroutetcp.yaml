---
# TCP IngressRoute for SSH passthrough
# → ssh.home.kenchlightyear.com:2222 → 192.168.2.122:22
#
# REQUIRES: Router port-forward TCP 2222 → 192.168.2.122
# USAGE: ssh -p 2222 user@ssh.home.kenchlightyear.com

apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: ssh-passthrough
  namespace: homelab
spec:
  entryPoints:
    - ssh
  routes:
    - match: HostSNI(`*`)   # TCP passthrough — matches all (no SNI for SSH)
      services:
        - name: ssh-server
          port: 22
